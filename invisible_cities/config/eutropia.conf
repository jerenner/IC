# Eutropia computes the point spread function (PSF) from hit collections.

files_in    = '$ICDIR/database/test_data/Kr_hits_for_psf_*.h5'
# REPLACE /tmp with your output directory
file_out    = '/tmp/psf.h5'
compression = 'ZLIB4'

run_number  = -7000
detector_db = 'new'

# Transverse position ranges (mm)
xrange   = -200, 200
yrange   = -200, 200

# Drift time bin edges (mus): divides the detector into Z regions
zbins    =    0, 275, 550

# Transverse sectors for PSF computation (mm)
xsectors = -200,   0, 200
ysectors = -200,   0, 200

# Binning resolution in X-Y plane
bin_size_xy = 5.0 * mm
